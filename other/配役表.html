<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>キャスト・スタッフ一覧</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
@page { size: A4; margin: 14mm 18mm 14mm 18mm; }
body {
  font-family: 'Hiragino Mincho ProN','Yu Mincho','MS Mincho',Georgia,serif;
  font-size: 10pt;
  color: #1e0e00;
  background: #fff;
}
h1 {
  font-size: 16pt;
  font-weight: 700;
  color: #5a1500;
  text-align: center;
  letter-spacing: 0.1em;
  padding-bottom: 6px;
  border-bottom: 2px solid #b0802a;
  margin-bottom: 14px;
}
h2 {
  font-size: 11pt;
  font-weight: 700;
  color: #3a1000;
  border-bottom: 1px solid #b0802a;
  padding-bottom: 3px;
  margin: 12px 0 6px;
  letter-spacing: 0.08em;
}
table {
  border-collapse: collapse;
  width: 100%;
  font-size: 9.5pt;
}
th {
  background: #ede0c0;
  border: 1px solid #c0a060;
  padding: 4px 10px;
  font-weight: 700;
  text-align: left;
  color: #2a1000;
}
td {
  border: 1px solid #d4c4a0;
  padding: 3px 10px;
  vertical-align: middle;
  line-height: 1.5;
}
tr:nth-child(even) td { background: #faf6ec; }
.未定 { color: #aaa; font-style: italic; }
</style>
</head>
<body>
<h1>3年D組 文化祭　キャスト・スタッフ一覧</h1>

<h2>キャスト</h2>
<table>

<tbody>
<tr><td>子供アナ</td><td>ひなた・ゆな</td></tr>
<tr><td>夏アナ</td><td class="未定">未定</td></tr>
<tr><td>冬アナ</td><td>りえ・あおい</td></tr>
<tr><td>子供エルサ</td><td class="未定">未定</td></tr>
<tr><td>大人エルサ</td><td>あん・ここな</td></tr>
<tr><td>ハンス</td><td class="未定">未定</td></tr>
<tr><td>クリストフ</td><td>たつや・せいじ</td></tr>
<tr><td>オラフ</td><td>みらい・うらら</td></tr>
<tr><td>スヴェン</td><td>あいり・Kyo</td></tr>
<tr><td>ウェーゼルトン公爵</td><td>あゆま・こたに</td></tr>
<tr><td>トロール</td><td>ゆみか・けんしん・くるみ・かれん・まお・はると</td></tr>
<tr><td>ナレーター</td><td>志内・こうすけ・ゆうな・わかな</td></tr>

</table>

<h2>スタッフ</h2>
<table>

<tbody>
<tr><td>舞台監督</td><td>佐々木・時谷・船津</td></tr>
<tr><td>照明係</td><td>安部・村田</td></tr>
<tr><td>音響係</td><td>佐野・酒井</td></tr>
<tr><td>大道具係</td><td>佐野</td></tr>
<tr><td>小道具係</td><td>佐々木</td></tr>
</tbody>
</table>
</body>
</html>
